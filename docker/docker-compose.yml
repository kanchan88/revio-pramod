services:
  db:
    image: mariadb:10.11
    container_name: infernepal_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wp
      MARIADB_PASSWORD: wppass
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  wordpress:
    image: wordpress:php8.2-apache
    container_name: infernepal_wp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8090:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wppass
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://localhost:8090');
        define('WP_SITEURL', 'http://localhost:8090');
    volumes:
      - wp_data:/var/www/html
      # Auto-loaded plugin: registers Software CPT + seeds products
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
      # Custom theme — Infer Nepal (mounted alongside the default themes)
      - ./wp-content/themes/infer-nepal:/var/www/html/wp-content/themes/infer-nepal
      # Static assets (vendor logos) accessible via /wp-content/uploads/logos/*
      - ./wp-content/uploads:/var/www/html/wp-content/uploads

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: infernepal_pma
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootpass
      UPLOAD_LIMIT: 64M

volumes:
  db_data:
  wp_data:
